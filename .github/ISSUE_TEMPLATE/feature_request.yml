name: Feature request
description: Propose an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired API/behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: impact
    attributes:
      label: Compatibility impact
      description: Any breaking changes or migration concerns?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, upstream references.
