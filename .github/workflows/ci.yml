name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit, Race, Vet, Vuln
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Vulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  compat:
    name: Upstream Compatibility Snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check compatibility snapshot
        run: ./scripts/check-compat.sh
