name: Upstream Snapshot Sync

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Upstream branch in simplex-chat"
        required: false
        default: "stable"
        type: string
  schedule:
    - cron: "42 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Refresh Upstream Snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve upstream branch
        id: cfg
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          branch="${INPUT_BRANCH}"
          if [ -z "$branch" ]; then
            branch="stable"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Update snapshots
        run: ./scripts/update-upstream.sh "${{ steps.cfg.outputs.branch }}"

      - name: Verify compatibility
        run: ./scripts/check-compat.sh

      - name: Run tests
        run: go test ./...

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/upstream-sync
          delete-branch: true
          commit-message: "chore(upstream): refresh simplex snapshots"
          title: "chore(upstream): refresh simplex snapshots (${{ steps.cfg.outputs.branch }})"
          body: |
            Automated upstream snapshot refresh.

            Source branch: `${{ steps.cfg.outputs.branch }}`

            Generated by workflow: `${{ github.workflow }}`.
